<body>

<!-- Main Title of Page -->
<h1>Quiz Time</h1>

<!-- Body Paragraph-->
<p>Lets Go over what you have learned!</p>

<div class="quiz-container">
  <div  class="timer"> Time Left: <span id="time">30</span>s</div>
  <div  class="question">Question will appear hear</div>
  <div  class="options"></div>
  <div  class="results">Your score: <span id="score">0</span></div>
  <button class="restart-btn">Restart Quiz</button>
</div>
<script>
  const quizData = [
    {
      question:"What are Cookies?",
      options: ["Bits of Data used to store data on the internet", "A delicious treat", "The bandwidth that is provided by your internet"],
      answer: "Bits of Data used to store data on the internet"
    },
    {
      question:"Where are cookies stored?",
      options: ["Depends on the browser you are using", "in a local data file", "On the webserver", "In the cloud"],
      answer: "Depends on the browser you are using, in a local data file"
    },
    {
      question:"Can my data be used eleswhere on the internet?",
      options: ["If it is not stated in the cookie policy than no", "Yes, everyone on the internet is able to see your data", ],
      answer: "If it is not stated in the cookie policy than no"
    }
    ];
  let currentQuestion = 0;
  let score = 0;
  let timeLeft = 30;
  let timeInterval;
  const timerEl = document.getElementById('time');
  const questionEl = document.querySelector('.question');
        const optionsEl = document.querySelector('.options');
        const resultEl = document.querySelector('.result');
        const scoreEl = document.getElementById('score');
        const restartBtn = document.querySelector('.restart-btn');

        // Function to load the question
        function loadQuestion() {
            if (currentQuestion >= quizData.length) {
                endQuiz();
                return;
            }
            clearInterval(timerInterval);
            timeLeft = 30;
            timerEl.textContent = timeLeft;
            startTimer();
            const currentQuiz = quizData[currentQuestion];
            questionEl.textContent = currentQuiz.question;
            optionsEl.innerHTML = ''; // Clear previous options
            currentQuiz.options.forEach(option => {
                const button = document.createElement('button');
                button.classList.add('option');
                button.textContent = option;
                button.onclick = () => checkAnswer(option);
                optionsEl.appendChild(button);
            });
        }

        // Check the answer
        function checkAnswer(selectedOption) {
            if (selectedOption === quizData[currentQuestion].answer) {
                score++;
            }
            currentQuestion++;
            loadQuestion();
        }

        // Start the timer
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endQuiz();
                }
            }, 1000);
        }

        // End the quiz and show the results
        function endQuiz() {
            clearInterval(timerInterval);
            questionEl.style.display = 'none';
            optionsEl.style.display = 'none';
            resultEl.style.display = 'block';
            scoreEl.textContent = score;
            restartBtn.style.display = 'block';
        }

        // Restart the quiz
        restartBtn.addEventListener('click', () => {
            // Reset variables
            currentQuestion = 0;
            score = 0;
            timeLeft = 30;
            timerEl.textContent = timeLeft;

            // Reset the display
            questionEl.style.display = 'block';
            optionsEl.style.display = 'flex'; // Ensure options are displayed correctly
            resultEl.style.display = 'none';
            restartBtn.style.display = 'none';

            // Load the first question
            loadQuestion();
        });

        // Initialize the quiz with the first question
        loadQuestion();
      
</script>
